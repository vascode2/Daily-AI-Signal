name: Daily AI Signal

on:
  workflow_dispatch:
  schedule:
    # 3:30 AM America/New_York (DST-safe): run at both 07:30 and 08:30 UTC,
    # then a step below picks whichever cron equals 03:30 ET for the current
    # DST offset (immune to GitHub's scheduler delays — see the gate step).
    - cron: "30 7 * * *"
    - cron: "30 8 * * *"

concurrency:
  group: daily-ai-signal
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      GEMINI_MODEL_FALLBACKS: ${{ vars.GEMINI_MODEL_FALLBACKS }}
      GEMINI_REQUEST_TIMEOUT_MS: ${{ vars.GEMINI_REQUEST_TIMEOUT_MS }}
      GEMINI_DELAY_MS: ${{ vars.GEMINI_DELAY_MS }}

      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
      NOTION_ROOT_TITLE: ${{ vars.NOTION_ROOT_TITLE }}
      NOTION_VERSION: ${{ vars.NOTION_VERSION }}
      DIGEST_SKIP_NOTION: ${{ vars.DIGEST_SKIP_NOTION }}

      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ vars.REDDIT_USER_AGENT }}
      REDDIT_DELAY_MS: ${{ vars.REDDIT_DELAY_MS }}
      REDDIT_RSS_RETRIES: ${{ vars.REDDIT_RSS_RETRIES }}
      REDDIT_RSS_MAX_429_SUBS: ${{ vars.REDDIT_RSS_MAX_429_SUBS }}

      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      X_API_BASE: ${{ vars.X_API_BASE }}
      X_PLAYWRIGHT_COMMAND: ${{ vars.X_PLAYWRIGHT_COMMAND }}
      X_PLAYWRIGHT_TIMEOUT_MS: ${{ vars.X_PLAYWRIGHT_TIMEOUT_MS }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      XAI_API_BASE: ${{ vars.XAI_API_BASE }}
      XAI_MODEL: ${{ vars.XAI_MODEL }}
      XAI_REQUEST_TIMEOUT_MS: ${{ vars.XAI_REQUEST_TIMEOUT_MS }}

      DIGEST_TIMEZONE: ${{ vars.DIGEST_TIMEZONE }}
      DIGEST_LANGUAGE: ${{ vars.DIGEST_LANGUAGE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set sane defaults for optional vars
        run: |
          {
            echo "GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}"
            echo "GEMINI_MODEL_FALLBACKS=${GEMINI_MODEL_FALLBACKS:-gemini-flash-latest,gemini-2.0-flash,gemini-2.0-flash-lite,gemini-flash-lite-latest}"
            echo "GEMINI_REQUEST_TIMEOUT_MS=${GEMINI_REQUEST_TIMEOUT_MS:-120000}"
            echo "GEMINI_DELAY_MS=${GEMINI_DELAY_MS:-5000}"

            echo "NOTION_ROOT_TITLE=${NOTION_ROOT_TITLE:-Daily AI Signal}"
            echo "NOTION_VERSION=${NOTION_VERSION:-2026-03-11}"
            echo "DIGEST_SKIP_NOTION=${DIGEST_SKIP_NOTION:-false}"

            echo "REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-daily-ai-signal/0.1 by u/yourusername}"
            echo "REDDIT_DELAY_MS=${REDDIT_DELAY_MS:-2500}"
            echo "REDDIT_RSS_RETRIES=${REDDIT_RSS_RETRIES:-2}"
            echo "REDDIT_RSS_MAX_429_SUBS=${REDDIT_RSS_MAX_429_SUBS:-3}"

            echo "X_API_BASE=${X_API_BASE:-https://api.twitter.com/2}"
            echo "X_PLAYWRIGHT_TIMEOUT_MS=${X_PLAYWRIGHT_TIMEOUT_MS:-120000}"
            echo "XAI_API_BASE=${XAI_API_BASE:-https://api.x.ai/v1}"
            echo "XAI_MODEL=${XAI_MODEL:-grok-4.3}"
            echo "XAI_REQUEST_TIMEOUT_MS=${XAI_REQUEST_TIMEOUT_MS:-120000}"

            echo "DIGEST_TIMEZONE=${DIGEST_TIMEZONE:-America/New_York}"
            echo "DIGEST_LANGUAGE=${DIGEST_LANGUAGE:-en}"
          } >> "$GITHUB_ENV"

      - name: Select the 03:30 ET cron for the current DST period
        if: github.event_name == 'schedule'
        env:
          # The cron expression that actually triggered this run.
          TRIGGERED_CRON: ${{ github.event.schedule }}
        run: |
          # GitHub's scheduler is best-effort and often delays runs by many
          # minutes/hours, so we must NOT gate on the wall-clock execution time.
          # Instead, we run once per day by picking the cron that equals 03:30 ET
          # for the current DST offset:
          #   EDT (-0400): 07:30 UTC == 03:30 ET  -> use "30 7 * * *"
          #   EST (-0500): 08:30 UTC == 03:30 ET  -> use "30 8 * * *"
          offset=$(TZ=America/New_York date +%z)
          run=false
          if [ "$offset" = "-0400" ] && [ "$TRIGGERED_CRON" = "30 7 * * *" ]; then run=true; fi
          if [ "$offset" = "-0500" ] && [ "$TRIGGERED_CRON" = "30 8 * * *" ]; then run=true; fi
          if [ "$run" = "true" ]; then
            echo "Running: cron '$TRIGGERED_CRON' matches 03:30 ET (offset $offset)."
          else
            echo "Skipping: cron '$TRIGGERED_CRON' is not the 03:30 ET cron for offset $offset."
          fi
          echo "RUN_PIPELINE=$run" >> "$GITHUB_ENV"

      - name: Enable pipeline for manual runs
        if: github.event_name != 'schedule'
        run: echo "RUN_PIPELINE=true" >> "$GITHUB_ENV"

      - name: Validate required secrets
        if: env.RUN_PIPELINE == 'true'
        run: |
          missing=0
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Missing required secret GEMINI_API_KEY"
            missing=1
          fi
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::error::Missing required secret NOTION_TOKEN"
            missing=1
          fi
          if [ -z "$NOTION_PAGE_ID" ]; then
            echo "::error::Missing required secret NOTION_PAGE_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run digest pipeline
        if: env.RUN_PIPELINE == 'true'
        run: npm start

      - name: Upload output markdown
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-signal-output
          path: output/*.md
          if-no-files-found: ignore
